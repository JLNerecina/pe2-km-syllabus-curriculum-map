<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | CICS Curriculum Map</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>

            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for subtle glass feel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(11, 19, 38, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(128, 131, 255, 0.2);
            border-radius: 10px;
        }
    </style>

          theme: {
            extend: {
              "colors": {
                      "primary-container": "#8083ff",
                      "inverse-surface": "#dae2fd",
                      "outline": "#908fa0",
                      "on-secondary-container": "#00344e",
                      "surface-container": "#171f33",
                      "inverse-on-surface": "#283044",
                      "error-container": "#93000a",
                      "primary": "#c0c1ff",
                      "secondary-fixed-dim": "#89ceff",

                      "tertiary-fixed": "#efdbff",
                      "on-surface-variant": "#c7c4d7",
                      "tertiary": "#dbb8ff",
                      "surface-bright": "#31394d",

                      "outline-variant": "#464554",
                      "primary-fixed-dim": "#c0c1ff",
                      "on-primary-container": "#0d0096",
                      "secondary": "#89ceff",
                      "on-primary": "#1000a9",
                      "error": "#ffb4ab",
                      "surface-variant": "#2d3449",
                      "secondary-fixed": "#c9e6ff",
                      "surface-container-high": "#222a3d",

                      "stack-lg": "48px",
                      "stack-md": "24px",
                      "section-padding": "80px",

                      "gutter": "24px",
                      "container-max": "1280px",
                      "unit": "4px"

<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Cosmic Background Decoration -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-secondary-container/10 blur-[150px] rounded-full"></div>
<div class="absolute top-[20%] right-[10%] w-[30%] h-[30%] bg-tertiary-container/10 blur-[100px] rounded-full"></div>
<!-- Noise Texture Overlay -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none mix-blend-overlay" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD-xwlvrHCBVZ6yvaaQirDI2UcJDrRNyToEwBuN854_AscnpklZ9JqybP0oKl4Chvn3e1hzJfLrAIamGfifvq7X-LvjtJPanuONOcjbtFM7wC9qhMqHVvHJaha1wcIxvLo1Vl39XdsxugctpwgYIdQUQU3Eez7VPuuKuj8mFqsx9YkFPmnizdoBYDy5XgS0soCr1qCbZMfW298lW-yqdy-7hXg8isB3iO72k-NXHqoX_Pbn6vdf1hcN2cPZZhtACWfIgFQgw1Tqqys');"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-margin-mobile">
<!-- Error Toast (Hidden by default but present in DOM) -->
<div class="hidden absolute -top-24 left-0 right-0 animate-bounce">
<div class="bg-error-container border border-error/30 text-on-error-container px-6 py-4 rounded-xl flex items-center gap-3 shadow-2xl backdrop-blur-md">
<span class="material-symbols-outlined text-error">error</span>
<p class="font-label-md text-label-md">You are not yet enrolled in any program</p>
</div>
</div>
<div class="bg-surface-container/60 backdrop-blur-xl border border-outline-variant/30 rounded-3xl p-10 shadow-2xl shadow-black/50 overflow-hidden relative group">
<!-- Glass Inner Shine -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent pointer-events-none"></div>
<div class="relative z-10 flex flex-col items-center">
<!-- University Logo -->
<div class="mb-stack-md relative">
<div class="w-20 h-20 bg-primary/10 rounded-2xl flex items-center justify-center border border-primary/20 shadow-inner group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-primary text-4xl" data-weight="fill">school</span>
</div>
<div class="absolute -inset-2 bg-primary/20 blur-xl opacity-50 rounded-full"></div>
</div>
<!-- Title & Branding -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-xl text-headline-md mb-2 bg-gradient-to-r from-indigo-400 to-cyan-300 bg-clip-text text-transparent">
                        CICS Curriculum Map
                    </h1>
<p class="font-body-md text-on-surface-variant max-w-[280px] mx-auto">
                        Academic Portal for Information and Computing Sciences
                    </p>
</div>
<!-- Action Button -->
<div class="w-full space-y-stack-md">
<button class="w-full flex items-center justify-center gap-4 bg-gradient-to-r from-primary-container to-secondary-container text-white font-label-md text-label-md py-4 px-6 rounded-xl hover:shadow-[0_0_20px_rgba(128,131,255,0.4)] hover:brightness-110 transition-all duration-300 group/btn active:scale-[0.98]">
<svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path>
</svg>
                        Sign in with Google
                    </button>
<div class="flex items-center gap-3 py-2">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-label-sm font-label-sm text-outline">OR</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Institutional Links -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 font-label-sm text-label-sm text-on-surface-variant bg-surface-variant/40 border border-outline-variant/20 py-3 rounded-lg hover:bg-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-sm">help_outline</span>
                            Support
                        </button>
<button class="flex items-center justify-center gap-2 font-label-sm text-label-sm text-on-surface-variant bg-surface-variant/40 border border-outline-variant/20 py-3 rounded-lg hover:bg-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-sm">policy</span>
                            Policies
                        </button>
</div>
</div>
</div>
</div>
<!-- Footer Text -->
<footer class="mt-stack-md text-center">
<p class="font-body-md text-on-surface-variant/60 text-xs flex items-center justify-center gap-1">
                Made with <span class="material-symbols-outlined text-primary text-[10px]" data-weight="fill">auto_awesome</span> by University Research Center
            </p>
</footer>
</main>
<!-- Floating Sparkles (Decorative) -->
<div class="absolute inset-0 pointer-events-none opacity-20">
<div class="absolute top-[20%] left-[15%] w-1 h-1 bg-white rounded-full animate-pulse"></div>
<div class="absolute top-[40%] right-[10%] w-0.5 h-0.5 bg-white rounded-full animate-pulse" style="animation-delay: 1s"></div>
<div class="absolute bottom-[30%] left-[25%] w-1.5 h-1.5 bg-primary rounded-full animate-pulse" style="animation-delay: 2s"></div>
<div class="absolute bottom-[10%] right-[20%] w-1 h-1 bg-secondary-container rounded-full animate-pulse" style="animation-delay: 1.5s"></div>
</div>
</body></html>
